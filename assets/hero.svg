<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 360" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Pazent — quantum-resistant systems">
  <defs>
    <!-- Background obsidian gradient -->
    <radialGradient id="bg" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#1a2533"/>
      <stop offset="55%" stop-color="#0d121a"/>
      <stop offset="100%" stop-color="#05080c"/>
    </radialGradient>
    <!-- Cyan-to-gold text gradient (curs3d palette) -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3fd0d4"/>
      <stop offset="60%" stop-color="#5eeaee"/>
      <stop offset="100%" stop-color="#c8a96b"/>
    </linearGradient>
    <!-- Particle glow -->
    <radialGradient id="particle" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5eeaee" stop-opacity="0.95"/>
      <stop offset="60%" stop-color="#3fd0d4" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#3fd0d4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="particleGold" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd99c" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#c8a96b" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#c8a96b" stop-opacity="0"/>
    </radialGradient>
    <!-- Subtle grid pattern -->
    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M 80 0 L 0 0 0 80" fill="none" stroke="#3fd0d4" stroke-width="0.5" stroke-opacity="0.08"/>
    </pattern>
    <!-- Glow filter for the title -->
    <filter id="textGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Soft glow for particles -->
    <filter id="particleBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <!-- Scanline -->
    <linearGradient id="scan" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3fd0d4" stop-opacity="0"/>
      <stop offset="50%" stop-color="#3fd0d4" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#3fd0d4" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="360" fill="url(#bg)"/>
  <rect width="1280" height="360" fill="url(#grid)"/>

  <!-- Floating quantum particles (with SMIL animation; degrades gracefully on GitHub) -->
  <g filter="url(#particleBlur)">
    <circle r="14" fill="url(#particle)">
      <animate attributeName="cx" values="100;1180;100" dur="22s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="80;180;280;80" dur="18s" repeatCount="indefinite"/>
    </circle>
    <circle r="10" fill="url(#particle)">
      <animate attributeName="cx" values="900;200;900" dur="26s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="280;100;280" dur="20s" repeatCount="indefinite"/>
    </circle>
    <circle r="8" fill="url(#particleGold)">
      <animate attributeName="cx" values="600;1100;100;600" dur="28s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="50;240;50" dur="24s" repeatCount="indefinite"/>
    </circle>
    <circle r="11" fill="url(#particle)">
      <animate attributeName="cx" values="300;1000;300" dur="30s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="240;60;240" dur="22s" repeatCount="indefinite"/>
    </circle>
    <circle r="7" fill="url(#particleGold)">
      <animate attributeName="cx" values="1150;50;1150" dur="32s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="180;180;180" dur="32s" repeatCount="indefinite"/>
    </circle>
    <circle r="9" fill="url(#particle)">
      <animate attributeName="cx" values="500;800;200;500" dur="24s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="320;40;320" dur="26s" repeatCount="indefinite"/>
    </circle>
    <circle r="6" fill="url(#particleGold)">
      <animate attributeName="cx" values="50;1230;50" dur="36s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="120;220;120" dur="20s" repeatCount="indefinite"/>
    </circle>
    <circle r="13" fill="url(#particle)">
      <animate attributeName="cx" values="750;250;750" dur="34s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="160;200;160" dur="18s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Decorative orbital ring around the title -->
  <g transform="translate(640 180)" fill="none" stroke="#3fd0d4" stroke-opacity="0.18">
    <ellipse rx="320" ry="60" stroke-width="1">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="60s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse rx="380" ry="80" stroke-width="0.5" stroke-opacity="0.10">
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="80s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <!-- Pre-title cryptographic equation (decorative, fixed-width) -->
  <text x="640" y="100"
        font-family="'JetBrains Mono', 'Courier New', monospace"
        font-size="14"
        fill="#3fd0d4"
        fill-opacity="0.55"
        text-anchor="middle"
        letter-spacing="2">
    σ ← Sign(skᴅɪʟ, m)  ·  verify(pkᴅɪʟ, m, σ) → {0,1}  ·  FIPS 204
  </text>

  <!-- Main title -->
  <text x="640" y="208"
        font-family="'Space Grotesk', 'Helvetica Neue', sans-serif"
        font-weight="700"
        font-size="120"
        fill="url(#textGrad)"
        text-anchor="middle"
        filter="url(#textGlow)"
        letter-spacing="-2">
    Pazent
  </text>

  <!-- Subtitle -->
  <text x="640" y="252"
        font-family="'IBM Plex Sans', 'Helvetica Neue', sans-serif"
        font-weight="500"
        font-size="20"
        fill="#d8e2ec"
        text-anchor="middle"
        letter-spacing="6">
    POST-QUANTUM SYSTEMS · BUILT FROM ZERO IN RUST
  </text>

  <!-- Bottom strip line + status -->
  <line x1="240" y1="296" x2="1040" y2="296" stroke="#3fd0d4" stroke-opacity="0.3" stroke-width="1"/>
  <text x="640" y="318"
        font-family="'JetBrains Mono', 'Courier New', monospace"
        font-size="12"
        fill="#a4b3c3"
        text-anchor="middle"
        letter-spacing="3">
    curs3d.fr  ·  testnet live  ·  4 BFT validators  ·  open source (MIT)
  </text>

  <!-- Animated scan line passing across the banner -->
  <rect x="0" y="0" width="1280" height="6" fill="url(#scan)" opacity="0.6">
    <animate attributeName="y" values="-6;360;-6" dur="14s" repeatCount="indefinite"/>
  </rect>

  <!-- Corner brackets — cyberpunk frame accents -->
  <g stroke="#3fd0d4" stroke-width="2" fill="none" stroke-opacity="0.55">
    <path d="M 30 30 L 30 70 M 30 30 L 70 30"/>
    <path d="M 1250 30 L 1250 70 M 1250 30 L 1210 30"/>
    <path d="M 30 330 L 30 290 M 30 330 L 70 330"/>
    <path d="M 1250 330 L 1250 290 M 1250 330 L 1210 330"/>
  </g>
</svg>
